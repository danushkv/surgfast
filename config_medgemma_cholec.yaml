# Configuration for MedGemma training on Cholecystectomy dataset

dataset:
  # Path to the root dataset directory
  dataset_root: "path_to_cholec_dataset"
  # Random seed for reproducible folder splitting
  seed: 42

model:
  # Model ID from HuggingFace
  model_id: "google/medgemma-1.5-4b-it"
  # Cache directory for model and processor
  cache_dir: "path_to_cache_directory"
  run_name: "run_gemma_10"
  compile: true

  # LoRA configuration
  lora_alpha: 16
  lora_dropout: 0.05
  lora_r: 16

training_args:
  # Output directory to save model checkpoints and logs
  output_dir: "path_to_output_dir"
  
  # Training parameters
  num_train_epochs: 10
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 16
  
  # Gradient accumulation
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  
  # Optimizer
  optim: "adamw_torch_fused"
  
  # Logging parameters
  logging_steps: 50
  
  # Checkpointing strategy
  save_strategy: "epoch"  # Options: "no", "steps", "epoch"
  
  # Evaluation strategy
  eval_strategy: "steps"  # Options: "no", "steps", "epoch"
  eval_steps: 50
  
  # Optimizer parameters
  learning_rate: 2.0e-4
  
  # Mixed precision training
  bf16: true
  compile: true
  
  # Gradient clipping
  max_grad_norm: 0.3
  
  # Learning rate warmup
  warmup_ratio: 0.03
  lr_scheduler_type: "linear"  # Options: "linear", "cosine", etc.
  
  # Hub and reporting
  push_to_hub: false
  report_to: "wandb"  # Options: "tensorboard", "wandb", etc.
  
